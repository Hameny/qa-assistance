spring:
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///qa_assist_test?TC_DAEMON=true
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: validate # Flyway управляет схемой
    show-sql: false
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=100,expireAfterWrite=10m

qa:
  assist:
    llm:
      provider: mock
    debug:
      mock-external-services: true