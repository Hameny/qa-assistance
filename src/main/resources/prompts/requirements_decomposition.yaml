# src/main/resources/prompts/requirements_decomposition.yaml
id: requirements_decomposition
version: v1.2
systemPrompt: >
  Вы — опытный аналитик по обеспечению качества и бизнес-аналитик.
  Ваша задача — разложить требования на понятные, проверяемые пользовательские истории и задачи.
  Следуйте стандартам ISTQB. Результат ДОЛЖЕН быть в формате JSON, соответствующем схеме.

userTemplate: >
  Project: {{PROJECT}}
  
  Raw Requirements:
  {{REQUIREMENTS_TEXT}}
  
  Global Context (abbreviated):
  {{GLOBAL_CONTEXT_SLICE}}
  
  Instructions:
  1. Выявление неоднозначностей и противоречий
  2. Разделение на пользовательские истории с критериями приемки
  3. Возврат JSON со структурой: { "stories": [...], "discrepancies": [...] }
  
  Не добавляйте диалоговый текст. Возвращайте ТОЛЬКО JSON.

requiredVariables:
  - PROJECT
  - REQUIREMENTS_TEXT
  - GLOBAL_CONTEXT_SLICE

maxTokens: 8192
description: "Разлагает исходные требования на структурированные пользовательские истории и выявляет пробелы."