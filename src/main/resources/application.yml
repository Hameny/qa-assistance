# src/main/resources/application.yml
qa:
  assist:
    # LLM конфигурация
    llm:
      provider: openai
      model: gpt-4-turbo
      temperature: 0.1
      max-tokens: 4096
      timeout-seconds: 120
      retry:
        max-attempts: 3
        backoff-ms: 1000
      custom-headers: {}  # Мапа для доп. заголовков

    # Jira
    jira:
      base-url: https://company.atlassian.net
      email: ${JIRA_EMAIL}
      api-token: ${JIRA_API_TOKEN}
      project-key: QA

    # GitLab
    gitlab:
      base-url: https://gitlab.com
      token: ${GITLAB_TOKEN}
      project-id: ${GITLAB_PROJECT_ID}

    # Global Context
    global-context:
      base-path: ./global-context
      cache-ttl-minutes: 30
      allowed-sources:
        - jira
        - confluence
        - figma
        - openapi

    # Pipeline
    pipeline:
      quality-gates:
        require-json-schema: true
        require-traceability: true
        min-coverage-percent: 80
      auto-mode: false
      parallel-stages-max: 4

    # Logging & Debug
    debug:
      enabled: false
      dump-llm-responses: false
      mock-external-services: false

spring:
  profiles:
    active: dev
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false