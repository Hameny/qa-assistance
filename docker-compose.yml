version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: qa_assist_db
    environment:
      POSTGRES_DB: qa_assist
      POSTGRES_USER: qa_user
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qa_user -d qa_assist"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_test:
    image: postgres:15-alpine
    container_name: qa_assist_test_db
    environment:
      POSTGRES_DB: qa_assist_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  postgres_test_data: